server:
  port: 8080

spring:
  application:
    name: campushub-testing-lab
  datasource:
    url: jdbc:h2:mem:campushub;MODE=PostgreSQL;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      encoding: UTF-8
