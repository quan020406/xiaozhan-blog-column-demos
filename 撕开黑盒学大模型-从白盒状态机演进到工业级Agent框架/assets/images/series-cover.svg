<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">撕开黑盒学大模型专栏封面</title>
  <desc id="desc">打开的黑盒中露出白盒状态机循环，周围是工具、记忆、调度、持久化和可观测性模块。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.58" stop-color="#eaf4fb"/>
      <stop offset="1" stop-color="#dbeaf2"/>
    </linearGradient>
    <linearGradient id="boxTop" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101820"/>
      <stop offset="1" stop-color="#2d3741"/>
    </linearGradient>
    <linearGradient id="boxFace" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1c2833"/>
      <stop offset="1" stop-color="#071016"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf6fb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#16202a" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f8fb3"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M80 688 C290 610 410 722 600 650 C800 572 944 620 1134 570 C1310 524 1438 570 1520 515 L1520 900 L80 900 Z" fill="#d5e8f0" opacity="0.55"/>
  <path d="M0 740 C215 680 350 780 548 704 C760 623 914 676 1128 618 C1334 562 1472 626 1600 560 L1600 900 L0 900 Z" fill="#c9e0e8" opacity="0.55"/>

  <g opacity="0.48" stroke="#8cb7c6" stroke-width="2" fill="none">
    <path d="M1118 168 H1394 V392"/>
    <path d="M1192 238 H1460"/>
    <path d="M1160 300 H1512"/>
    <path d="M1248 366 H1448"/>
    <circle cx="1118" cy="168" r="5" fill="#0f8fb3"/>
    <circle cx="1394" cy="392" r="5" fill="#0f8fb3"/>
    <circle cx="1460" cy="238" r="5" fill="#f4a02a"/>
  </g>

  <g transform="translate(690 128)" opacity="0.9">
    <rect x="0" y="0" width="186" height="62" rx="12" fill="#ffffff" stroke="#b5d0db"/>
    <text x="93" y="39" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#31414d">Memory</text>
    <rect x="232" y="38" width="198" height="62" rx="12" fill="#ffffff" stroke="#b5d0db"/>
    <text x="331" y="77" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#31414d">Schedule</text>
    <rect x="492" y="12" width="216" height="62" rx="12" fill="#ffffff" stroke="#b5d0db"/>
    <text x="600" y="51" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#31414d">Persistence</text>
    <rect x="568" y="106" width="224" height="62" rx="12" fill="#ffffff" stroke="#b5d0db"/>
    <text x="680" y="145" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#31414d">Observability</text>
  </g>

  <g transform="translate(172 118)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f2530">撕开黑盒学大模型</text>
    <text x="0" y="52" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="600" fill="#365263">从白盒状态机演进到工业级 Agent 框架</text>
    <line x1="0" y1="82" x2="472" y2="82" stroke="#0f8fb3" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M440 374 L796 248 L1166 374 L802 520 Z" fill="url(#boxTop)"/>
    <path d="M440 374 L802 520 L802 746 L440 588 Z" fill="url(#boxFace)"/>
    <path d="M802 520 L1166 374 L1166 592 L802 746 Z" fill="#111a22"/>
    <path d="M440 374 L796 248 L1166 374 L802 520 Z" fill="none" stroke="#51616c" stroke-width="3"/>
    <path d="M802 520 L802 746" stroke="#33424d" stroke-width="3"/>
  </g>

  <g transform="translate(565 288)" filter="url(#shadow)">
    <rect x="0" y="0" width="478" height="304" rx="28" fill="url(#panel)" stroke="#9dcbd7" stroke-width="3"/>
    <rect x="26" y="24" width="426" height="256" rx="22" fill="#fafdff" stroke="#d3e8ee"/>

    <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">
      <rect x="178" y="38" width="122" height="48" rx="18" fill="#ffffff" stroke="#0f8fb3" stroke-width="3"/>
      <text x="239" y="69" text-anchor="middle" fill="#17313b">State</text>

      <rect x="322" y="112" width="112" height="48" rx="18" fill="#ffffff" stroke="#0f8fb3" stroke-width="3"/>
      <text x="378" y="143" text-anchor="middle" fill="#17313b">Model</text>

      <rect x="302" y="208" width="112" height="48" rx="18" fill="#ffffff" stroke="#0f8fb3" stroke-width="3"/>
      <text x="358" y="239" text-anchor="middle" fill="#17313b">Action</text>

      <rect x="64" y="208" width="112" height="48" rx="18" fill="#ffffff" stroke="#0f8fb3" stroke-width="3"/>
      <text x="120" y="239" text-anchor="middle" fill="#17313b">Tool</text>

      <rect x="44" y="112" width="154" height="48" rx="18" fill="#ffffff" stroke="#0f8fb3" stroke-width="3"/>
      <text x="121" y="143" text-anchor="middle" fill="#17313b">Observation</text>

      <rect x="190" y="134" width="98" height="48" rx="18" fill="#fff8ea" stroke="#f4a02a" stroke-width="3"/>
      <text x="239" y="165" text-anchor="middle" fill="#17313b">Final</text>
    </g>

    <g fill="none" stroke="#0f8fb3" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
      <path d="M299 64 C360 70 386 86 386 111"/>
      <path d="M380 160 C383 184 380 199 362 208"/>
      <path d="M302 232 H178"/>
      <path d="M120 208 C98 191 92 177 102 160"/>
      <path d="M196 126 C225 103 237 91 239 86"/>
      <path d="M239 86 V131" stroke="#f4a02a"/>
    </g>
  </g>

  <g opacity="0.86">
    <path d="M520 260 L332 180 L204 304 L394 385 Z" fill="#121c25"/>
    <path d="M520 260 L394 385 L442 512 L594 372 Z" fill="#0a1218"/>
    <path d="M332 180 L204 304 L394 385 L520 260 Z" fill="none" stroke="#5d6872" stroke-width="3"/>
    <path d="M1086 260 L1280 182 L1404 304 L1208 384 Z" fill="#151f28"/>
    <path d="M1086 260 L1208 384 L1160 512 L1014 372 Z" fill="#0b1319"/>
    <path d="M1280 182 L1404 304 L1208 384 L1086 260 Z" fill="none" stroke="#5d6872" stroke-width="3"/>
  </g>

  <g opacity="0.68" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#395668">
    <text x="266" y="690">white-box loop</text>
    <text x="1120" y="690">production runtime</text>
  </g>

  <g fill="none" stroke="#0f8fb3" stroke-width="3" opacity="0.45">
    <path d="M312 654 C468 710 610 724 760 706"/>
    <path d="M850 706 C1010 724 1178 706 1324 648"/>
  </g>
</svg>
